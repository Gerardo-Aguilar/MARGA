# PlatformIO Configuration for AURA ESP32-CAM

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

# Serial Monitor
monitor_speed = 115200

# Upload Settings
upload_speed = 921600
upload_port = COM3  # Cambiar a /dev/ttyUSB0 en Linux/Mac

# Build Flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

# Libraries
lib_deps = 
    ; No se necesitan librerías externas para este proyecto

# Camera Settings
board_build.partitions = default_8MB.csv
